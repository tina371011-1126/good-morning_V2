<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-MQ0WMMRZH5');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>早安</title>
    <meta property="og:title" content="ㅤ"> 
    <meta property="og:description" content="ㅤ">
    
    <meta property="og:image" content="https://res.cloudinary.com/dwdkxs8ot/image/upload/c_fill,ar_1.91,w_1200/v1772095433/morning_1_npzo9f.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:type" content="article"> <style>
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #fffcf2; font-family: sans-serif; }
        .container { text-align: center; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); width: 85%; max-width: 450px; }
        img { width: 100%; border-radius: 12px; display: block; margin-bottom: 20px; }
        .share-btn { background: #00b900; color: white; border: none; padding: 16px; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; box-shadow: 0 4px 12px rgba(0,185,0,0.3); }
    </style>
</head>
<body>

    <div class="container">
        <h2 id="greeting">🌞 早安祝福</h2>
        <img id="random-image" src="" alt="早安圖">
        <p>點擊下方按鈕，把這份祝福傳送給好友</p>
        <button class="share-btn" onclick="shareAndTrack()">傳送大圖給好友 ➔</button>
    </div>

    <script>
        const imageUrls = [
            "https://res.cloudinary.com/dwdkxs8ot/image/upload/v1772095433/morning_1_npzo9f.jpg",
            "https://res.cloudinary.com/dwdkxs8ot/image/upload/v1772095434/morning_2_q5hbzf.jpg"
        ];

        const randomIndex = Math.floor(Math.random() * imageUrls.length);
        document.getElementById('random-image').src = imageUrls[randomIndex];

        const urlParams = new URLSearchParams(window.location.search);
        const currentSource = urlParams.get('utm_source') || 'seed';

        function shareAndTrack() {
            gtag('event', 'share_click', { 'from': currentSource });

            const newId = "U" + Math.floor(Math.random() * 9000 + 1000);
            const shareLink = `https://tina371011-1126.github.io/good-morning_V2/?utm_source=${newId}`;
            
            // 【修正】只傳送網址，不帶任何文字
            // 當訊息只有網址時，LINE 會自動將該網址的 OG 預覽圖放大
            const lineUrl = `https://line.me/R/share?text=${encodeURIComponent(shareLink)}`;
            
            window.location.href = lineUrl;
        }
    </script>
</body>
</html>
